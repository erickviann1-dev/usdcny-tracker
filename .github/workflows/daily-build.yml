name: Daily Data Build

on:
  schedule:
    # Run at 14:30 UTC every weekday (Mon-Fri) ≈ Beijing 22:30 / NY 9:30-10:30
    - cron: "30 14 * * 1-5"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

# One scheduled run at a time; newer run wins
concurrency:
  group: daily-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build.py
        run: python build.py

      - name: Commit and push build outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json BUILD_LOG.md docs/usdcny_tracker.xlsx docs/usdcny_tracker_replication.ipynb
          git diff --cached --quiet || git commit -m "$(cat <<EOF
          auto: daily data update $(date -u +%Y-%m-%d)

          Score: $(python -c "import json; d=json.load(open('docs/data.json')); print(d['snapshot'].get('composite_score','—'))")/100
          USD/CNY: $(python -c "import json; d=json.load(open('docs/data.json')); print(d['snapshot'].get('usdcny','—'))")
          EOF
          )"
          git push
